<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="430" fill="#F4F7F5"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5L0 10V0Z" fill="#5E746B"/></marker>
    <style>
      .title { font: 700 28px Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #17241F; }
      .label { font: 700 17px Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #17241F; }
      .small { font: 13px Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #4C6259; }
      .arrow { stroke: #5E746B; stroke-width: 2.2; marker-end: url(#arrow); }
    </style>
  </defs>
  <text x="600" y="58" text-anchor="middle" class="title">文档生命周期：MySQL 是事实来源，检索索引可重建</text>
  <rect x="70" y="152" width="190" height="88" rx="12" fill="#E4F3EF" stroke="#6AB6A3" stroke-width="2"/>
  <text x="165" y="186" text-anchor="middle" class="label">上传 / 新建</text>
  <text x="165" y="211" text-anchor="middle" class="small">document_id 生成</text>
  <rect x="350" y="152" width="190" height="88" rx="12" fill="#EEF4F8" stroke="#8BAFCA" stroke-width="2"/>
  <text x="445" y="186" text-anchor="middle" class="label">MySQL Document</text>
  <text x="445" y="211" text-anchor="middle" class="small">content / version / status</text>
  <rect x="630" y="92" width="190" height="88" rx="12" fill="#EEF4F8" stroke="#8BAFCA" stroke-width="2"/>
  <text x="725" y="126" text-anchor="middle" class="label">Milvus Chunk</text>
  <text x="725" y="151" text-anchor="middle" class="small">embedding / ACL</text>
  <rect x="630" y="252" width="190" height="88" rx="12" fill="#EEF4F8" stroke="#8BAFCA" stroke-width="2"/>
  <text x="725" y="286" text-anchor="middle" class="label">OpenSearch Chunk</text>
  <text x="725" y="311" text-anchor="middle" class="small">text / BM25 / ACL</text>
  <rect x="910" y="152" width="220" height="88" rx="12" fill="#FFF5E2" stroke="#E9B864" stroke-width="2"/>
  <text x="1020" y="186" text-anchor="middle" class="label">更新或删除</text>
  <text x="1020" y="211" text-anchor="middle" class="small">按 document_id 替换 / 清理 Chunk</text>
  <line x1="260" y1="196" x2="346" y2="196" class="arrow"/>
  <line x1="540" y1="182" x2="626" y2="138" class="arrow"/>
  <line x1="540" y1="210" x2="626" y2="294" class="arrow"/>
  <line x1="820" y1="138" x2="906" y2="182" class="arrow"/>
  <line x1="820" y1="294" x2="906" y2="210" class="arrow"/>
  <text x="600" y="394" text-anchor="middle" class="small">更新时先写新 Chunk，再清理同 document_id 的旧 Chunk；删除时清理索引并将 MySQL 状态标记为 deleted。</text>
</svg>
