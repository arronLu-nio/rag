<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#F4F7F5"/>
  <rect x="38" y="32" width="1124" height="636" rx="20" fill="#FFFFFF" stroke="#D8E3DD" stroke-width="2"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M0 0L10 5L0 10V0Z" fill="#5E746B"/></marker>
    <style>
      .title { font: 700 32px Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #17241F; }
      .subtitle { font: 16px Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #64756D; }
      .label { font: 700 18px Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #17241F; }
      .small { font: 14px Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #426056; }
      .tiny { font: 12px Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; fill: #64756D; }
      .arrow { stroke: #5E746B; stroke-width: 2.2; marker-end: url(#arrow); }
      .lane { fill: #FAFCFB; stroke: #D8E3DD; stroke-width: 1.5; }
      .api { fill: #E4F3EF; stroke: #6AB6A3; stroke-width: 2; }
      .store { fill: #EEF4F8; stroke: #8BAFCA; stroke-width: 2; }
      .model { fill: #FFF5E2; stroke: #E9B864; stroke-width: 2; }
      .flow { fill: #F2F5F3; stroke: #A8B9B0; stroke-width: 2; }
    </style>
  </defs>
  <text x="600" y="80" text-anchor="middle" class="title">企业知识库 RAG 当前架构</text>
  <text x="600" y="112" text-anchor="middle" class="subtitle">LangGraph 编排，MySQL + Milvus + OpenSearch 三层存储</text>

  <rect x="76" y="154" width="488" height="440" rx="16" class="lane"/>
  <text x="320" y="190" text-anchor="middle" class="label">文档入库</text>
  <rect x="110" y="224" width="150" height="70" rx="12" class="api"/>
  <text x="185" y="253" text-anchor="middle" class="label">工作台页面</text>
  <text x="185" y="277" text-anchor="middle" class="tiny">文本 / PDF / DOCX / Markdown</text>
  <rect x="304" y="224" width="220" height="70" rx="12" class="flow"/>
  <text x="414" y="253" text-anchor="middle" class="label">LangGraph 索引工作流</text>
  <text x="414" y="277" text-anchor="middle" class="tiny">解析 → 切分 → embedding → 发布</text>
  <line x1="260" y1="259" x2="300" y2="259" class="arrow"/>
  <rect x="104" y="360" width="128" height="84" rx="12" class="store"/>
  <text x="168" y="392" text-anchor="middle" class="label">MySQL</text>
  <text x="168" y="416" text-anchor="middle" class="tiny">全文 / 版本 / 状态</text>
  <rect x="256" y="360" width="128" height="84" rx="12" class="store"/>
  <text x="320" y="392" text-anchor="middle" class="label">Milvus</text>
  <text x="320" y="416" text-anchor="middle" class="tiny">Chunk / 向量 / ACL</text>
  <rect x="408" y="360" width="128" height="84" rx="12" class="store"/>
  <text x="472" y="392" text-anchor="middle" class="label">OpenSearch</text>
  <text x="472" y="416" text-anchor="middle" class="tiny">Chunk 文本 / BM25 / ACL</text>
  <line x1="358" y1="298" x2="182" y2="356" class="arrow"/>
  <line x1="414" y1="298" x2="320" y2="356" class="arrow"/>
  <line x1="470" y1="298" x2="466" y2="356" class="arrow"/>
  <text x="320" y="514" text-anchor="middle" class="small">上传原始文件保存在 data/uploads</text>

  <rect x="636" y="154" width="488" height="440" rx="16" class="lane"/>
  <text x="880" y="190" text-anchor="middle" class="label">知识问答</text>
  <rect x="670" y="224" width="150" height="70" rx="12" class="api"/>
  <text x="745" y="253" text-anchor="middle" class="label">用户问题</text>
  <text x="745" y="277" text-anchor="middle" class="tiny">租户 / 空间 / 主体</text>
  <rect x="864" y="224" width="220" height="70" rx="12" class="flow"/>
  <text x="974" y="253" text-anchor="middle" class="label">LangGraph 问答工作流</text>
  <text x="974" y="277" text-anchor="middle" class="tiny">召回 → 融合 → 重排 → 拒答/生成</text>
  <line x1="820" y1="259" x2="860" y2="259" class="arrow"/>
  <rect x="662" y="360" width="132" height="84" rx="12" class="store"/>
  <text x="728" y="392" text-anchor="middle" class="label">Milvus</text>
  <text x="728" y="416" text-anchor="middle" class="tiny">语义召回</text>
  <rect x="814" y="360" width="132" height="84" rx="12" class="store"/>
  <text x="880" y="392" text-anchor="middle" class="label">OpenSearch</text>
  <text x="880" y="416" text-anchor="middle" class="tiny">BM25 召回</text>
  <rect x="966" y="360" width="132" height="84" rx="12" class="model"/>
  <text x="1032" y="392" text-anchor="middle" class="label">百炼 Rerank</text>
  <text x="1032" y="416" text-anchor="middle" class="tiny">qwen3-vl-rerank</text>
  <line x1="900" y1="298" x2="736" y2="356" class="arrow"/>
  <line x1="956" y1="298" x2="880" y2="356" class="arrow"/>
  <line x1="1012" y1="298" x2="1026" y2="356" class="arrow"/>
  <rect x="752" y="494" width="256" height="58" rx="12" class="model"/>
  <text x="880" y="520" text-anchor="middle" class="label">DeepSeek 生成答案</text>
  <text x="880" y="542" text-anchor="middle" class="tiny">答案 + Citation + Trace</text>
  <line x1="1032" y1="448" x2="932" y2="490" class="arrow"/>
  <text x="600" y="640" text-anchor="middle" class="small">所有召回路径都在数据库端按 tenant_id、space_id、allowed_subjects 过滤</text>
</svg>
